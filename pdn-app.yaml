# pdn-app.yaml — the DAPPS app package manifest for packet.net node (pdn) hosts.
#
# UPSTREAM COPY: this is the app-authored manifest from the pdn app-package
# contract (m0lte/packet.net docs/app-packages.md). pdn discovers a directory
# containing this file under /usr/share/packetnet/apps/dapps (staged by pdn's
# deb from this repo's published release binary) or /var/lib/packetnet/apps/dapps
# (owner-installed), and the app stays OFF until the node owner enables it.
#
# The release workflow attaches this file as a release asset (next to the
# dapps-linux-* binaries, with `version:` stamped to the release tag) so pdn's
# build can fetch manifest + binary together from one release.
manifest: 1
id: dapps                     # must equal the package directory name
name: DAPPS
version: "0.34.2"            # informational, shown in pdn's UI — should track the release tag
description: Distributed Asynchronous Packet Pub/Sub — store-and-forward messaging over packet radio.
icon: inbox
capabilities: [packet, web]  # binds its own callsigns over RHPv2; serves its own web UI

# The .NET daemon pdn supervises while the app is enabled. No `session:` block —
# DAPPS is not a console verb; it speaks RHPv2 to the node and binds its own
# callsigns.
#
# CONFIG SEEDING — how DAPPS_* env vars behave: DAPPS has two modes, switched
# by DAPPS_ENV_MANAGED (read each start, never stored):
#
#   - unset/false (the standalone default): env vars seed missing options on
#     first start only; thereafter the dashboard owns every value.
#   - "true" (set below — pdn-supervised deployments opt in): every set
#     DAPPS_* env var is deployment-managed config — re-applied over whatever
#     the dashboard stored at EVERY start, and badged read-only in the
#     dashboard. Unset variables never touch stored config: anything not
#     pinned below stays editable live through the DAPPS dashboard's
#     /Setup // /Config pages, exactly as standalone.
#
# CALLSIGN — node-owned-callsign contract: a current pdn host injects
# PDN_APP_CALLSIGN = the exact callsign DAPPS must bind on air, and DAPPS
# binds it verbatim (no self-derivation, no SSID probe). The node is the
# callsign authority and re-asserts this value at every start.
#
# FALLBACK (older node / standalone): when PDN_APP_CALLSIGN is absent, pdn
# injects PDN_NODE_CALLSIGN, and while no real callsign is configured DAPPS
# derives its own identity as <node-base-callsign>-<DAPPS_SSID> (DAPPS_SSID
# defaults to 7, so node M0XYZ gets DAPPS at M0XYZ-7). If that SSID is
# already claimed on the node (pdn refuses the listen with errCode 9
# "Duplicate socket"), DAPPS probes the next free SSID over RHPv2 (skipping 0
# and the node's own SSID) and keeps the first one that binds — the confirmed
# identity is then stable across restarts. The owner can still pin a
# different identity via pdn's `apps:` override environment — an explicit
# DAPPS_CALLSIGN (or a real callsign saved via the dashboard) always wins
# over derivation and never probes:
#
#   apps:
#     - id: dapps
#       enabled: true
#       environment:
#         DAPPS_CALLSIGN: M0XYZ-9   # optional — omit to accept <nodecall>-7
#
# The working directory defaults to the app's state dir, so the database lands
# in /var/lib/packetnet/apps/dapps (DAPPS resolves it cwd-relative).
service:
  command: ./dapps            # relative — resolves to the release binary in this package dir
  environment:
    DAPPS_ENV_MANAGED: "true"             # opt in: env vars below are re-applied at every start
    DAPPS_NODE_BEARER: rhpv2              # speak RHPv2 to pdn (not AGW)
    DAPPS_NODE_HOST: "127.0.0.1"
    DAPPS_RHP_PORT: "9000"                # pdn's RHP server loopback port
    DAPPS_DEFAULT_BEARER_PORT: "0"
    DAPPS_UPDATE_CHECK_ENABLED: "false"   # the host package owns updates — no self-update nag
    ASPNETCORE_URLS: http://127.0.0.1:18080  # loopback only; must match ui.upstream
    DAPPS_MQTT_PORT: "18831"              # off the well-known 1883 — don't fight a real broker

# Node-prompt command that reaches DAPPS over the air: connecting to the
# node and typing DAPPS routes the session to this app's bound callsign.
packet:
  command: DAPPS

# pdn reverse-proxies /apps/dapps/ to the loopback upstream and shows a launcher tile.
ui:
  upstream: http://127.0.0.1:18080
  name: DAPPS
  icon: inbox
