name: ci

# One workflow that handles every commit:
#
#   - PR / workflow_dispatch       → build + test only.
#   - push to master, tests pass   → check whether a GitHub Release
#                                    already exists for v$(Version).
#                                    If not, build the release matrix
#                                    and publish it.
#
# Single source of truth for the version is `<Version>` in
# `src/dapps/Directory.Build.props`. Bump it in the same PR as the
# change you want released; merge → release. Don't bump it →
# the merge lands as a normal commit, no release. Same version twice
# → second push is a no-op (release-already-exists check).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # release job creates a Release on master pushes

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.value }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pre-pull integration images
        # Integration tests spin up linbpq + xrouter containers.
        # Pulling here makes per-test startup deterministic; without it
        # the first integration test blocks on a docker pull and
        # sometimes trips its own timeout.
        run: |
          docker pull m0lte/linbpq:latest
          docker pull ghcr.io/packethacking/xrouter:latest

      - name: Restore
        run: dotnet restore src/dapps/dapps.sln

      - name: Build
        run: dotnet build src/dapps/dapps.sln --no-restore --configuration Release

      - name: Test
        # Why a retry loop instead of a single `dotnet test`:
        #
        # The test job is the release gate - `build`/`release` run only
        # when this job's `should_release` output is `true`, and a failed
        # step short-circuits the rest of the job, so a SINGLE flaky test
        # silently strands a version-bumped release on the runway (the run
        # goes red but no binary is ever published). The suite has a known
        # intermittent failure (~1/683, a broker-port bind race - see
        # issue #152) that must not be able to block a real release.
        #
        # So: run the suite up to N times. A transient flake heals on a
        # later attempt and the release proceeds; a genuine regression
        # fails all N and correctly (and loudly) blocks it.
        #
        # On every failed attempt we dump the per-test results log to the
        # console. Under `dotnet test`, MTP writes the failing test NAME
        # only to that log file (stdout carries just the summary count),
        # so without this dump a flake is invisible without downloading
        # the artifact. Printing it makes "which test flaked" greppable in
        # the job log.
        run: |
          set -uo pipefail
          proj=src/dapps/dapps.core.tests/dapps.core.tests.csproj
          results=src/dapps/dapps.core.tests/bin/Release/net8.0/TestResults
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::Test attempt $i/$attempts"
            if dotnet test "$proj" --no-build --configuration Release -- --output detailed; then
              echo "::endgroup::"
              echo "Tests passed on attempt $i/$attempts."
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Test attempt $i/$attempts failed - dumping per-test results (the failing test name lives here, not in stdout):"
            find "$results" -name '*.log' -print -exec cat {} \; 2>/dev/null || true
            [ "$i" -lt "$attempts" ] && { echo "Retrying after transient failure..."; sleep 5; }
          done
          echo "::error::Tests failed after $attempts attempts - treating as a real failure, not a flake."
          exit 1

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: src/dapps/dapps.core.tests/bin/Release/net8.0/TestResults/
          if-no-files-found: ignore
          retention-days: 7

      - name: Read version
        id: version
        # `dotnet msbuild -getProperty:Version` is the official supported
        # way to read an MSBuild property without parsing XML.
        run: |
          v=$(dotnet msbuild src/dapps/dapps.core/dapps.core.csproj -getProperty:Version -nologo)
          echo "value=${v}" >> "$GITHUB_OUTPUT"
          echo "version: ${v}"

      - name: Decide release
        id: decide
        # Only on master pushes. PRs and workflow_dispatch never publish
        # - they're just verifying the build/test path works.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists - skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will publish $tag."
          fi

  # UI tests live in dapps.core.uitests - they boot dapps.core as a
  # subprocess and drive Razor pages with headless Chromium via
  # Playwright. Separate job rather than rolled into `test` because:
  # (1) Chromium install + browser deps are a noticeable slowdown the
  # unit suite shouldn't pay; (2) UI tests run as their own subprocess
  # so docker / port collisions are isolated; (3) keeping them
  # non-blocking on the release decision means a flaky browser
  # interaction can't strand a release on the runway.
  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore + build dapps.core.uitests
        run: |
          dotnet restore src/dapps/dapps.core.uitests/dapps.core.uitests.csproj
          dotnet build src/dapps/dapps.core.uitests/dapps.core.uitests.csproj --no-restore --configuration Release

      - name: Install Chromium + system deps
        # `--with-deps` apt-installs the libs Chromium needs (libnss3,
        # libxss1, etc.). Without this the browser launches but
        # immediately crashes on a missing-shared-library error.
        run: pwsh src/dapps/dapps.core.uitests/bin/Release/net8.0/playwright.ps1 install --with-deps chromium

      - name: Pre-build dapps.core
        # WebAppFixture launches the already-built dll if present.
        # Pre-building here removes a race where the first test
        # triggers a build that takes longer than the 60s "Now
        # listening on" wait window. Configuration matches the test
        # build so LocateDappsBinary finds the dll on the first try.
        run: dotnet build src/dapps/dapps.core/dapps.core.csproj --configuration Release

      - name: Run UI tests
        run: dotnet test src/dapps/dapps.core.uitests/dapps.core.uitests.csproj --no-build --configuration Release -- --output detailed

      - name: Upload screenshots
        # Always upload - screenshots are useful both for failure
        # triage AND as a reference for "what does the UI look like
        # right now after this PR".
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-screenshots
          path: tests/screenshots/
          if-no-files-found: ignore
          retention-days: 14

  # .NET 8 LTS targets glibc 2.23 - older than any modern distro - so
  # building on ubuntu-latest produces binaries that load on Raspberry
  # Pi OS 11 (Bullseye) and newer without further plumbing.
  build:
    needs: test
    if: needs.test.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            ext: ''
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            ext: ''
          - rid: linux-arm
            os: ubuntu-latest      # cross-compiled from x64
            ext: ''
          - rid: win-x64
            os: windows-latest
            ext: '.exe'
          - rid: osx-arm64
            os: macos-latest
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained single file
        # PublishSingleFile bundles managed assemblies; the extra
        # IncludeNativeLibrariesForSelfExtract flag pulls native deps
        # (e.g. SQLite's libe_sqlite3.so) into the same exe so the
        # operator drops one file on a server. Trimming is left off:
        # ASP.NET Core + DI + JSON have enough reflection that trimming
        # tends to break startup in subtle ways. Binary size is ~100MB
        # - acceptable cost for "no runtime install needed".
        #
        # IncludeAllContentForSelfExtract=true forces every bundled
        # assembly (managed AND native) to be extracted to a per-run
        # cache dir on startup, instead of the default in-memory bundle
        # resolver. We hit a real reproducible bug on linux-arm where
        # the in-memory resolver couldn't load System.Diagnostics.Process
        # - the assembly bytes were in the bundle (verified via
        # `strings`) but the runtime threw FileNotFoundException when
        # JIT'ing code that referenced it. The behaviour was 100%
        # reproducible across consecutive apply-update runs and not
        # transient. Forcing extraction puts every assembly on disk
        # where the standard fs resolver finds it; trades a tiny
        # startup penalty (~few hundred MB to /tmp/.net/...) for a
        # working binary on the only platform this matters for in
        # practice. The other RIDs (linux-x64, linux-arm64, win-x64,
        # osx-arm64) absorb this with no observed downside.
        shell: bash
        run: |
          dotnet publish src/dapps/dapps.core/dapps.core.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:DebugType=embedded \
            --output publish

      - name: Stage release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "publish/dapps.core${{ matrix.ext }}" "dist/dapps-${{ matrix.rid }}${{ matrix.ext }}"
          test -s "dist/dapps-${{ matrix.rid }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v6
        with:
          name: dapps-${{ matrix.rid }}
          path: dist/dapps-${{ matrix.rid }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: [test, build]
    if: needs.test.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Stamp manifest version
        # pdn-app.yaml's `version:` field is informational (pdn shows it
        # in its UI) and should track the release tag. Stamp it into the
        # copy we attach so the asset always matches the release it
        # ships with; the repo copy stays as-is.
        run: |
          sed -i 's/^version: .*/version: "${{ needs.test.outputs.version }}"/' pdn-app.yaml
          grep '^version:' pdn-app.yaml

      - name: Create GitHub Release
        # pdn-app.yaml rides along as a release asset so the pdn build
        # can fetch manifest + binary from the same release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ needs.test.outputs.version }}"
          gh release create "$tag" \
            --title "$tag" \
            --target "${{ github.sha }}" \
            --generate-notes \
            dist/* \
            pdn-app.yaml
